name: Daily AI Curation Bot

on:
  schedule:
    # 매일 새벽 3시에 자동 실행 (UTC 시간 기준 18:00은 KST 03:00)
    - cron: '0 18 * * *'
  # 수동으로도 실행할 수 있도록 허용
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-curate:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 환경 설정
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run the auto-curator script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production
        run: node scripts/autoCurator.js

      - name: 새로운 데이터 GitHub DB에 자동 저장(Commit)
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "K-SPOT AI Curator"
          git config --global user.email "ai-curator@thekspot.today"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/aheng11110-cyber/thekspot.git
          git add src/data/curationDB.json
          git commit -m "🤖 AI Auto Update: 새로운 핫플 데이터 추가" || echo "No changes to commit"
          git push
